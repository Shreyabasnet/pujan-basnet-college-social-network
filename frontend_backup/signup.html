<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen px-4">

  <!-- Login Card -->
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8 space-y-6">
    
    <!-- Header -->
    <h1 class="text-3xl font-bold text-center text-gray-800">Welcome Back</h1>
    <p class="text-center text-gray-500">Log in to your account</p>

    <!-- Login Form -->
    <form class="space-y-4">
      <!-- Email -->
      <div>
        <label class="block text-gray-700 font-medium mb-1">Email Address</label>
        <input 
          type="email" 
          placeholder="Enter your email" 
          required 
          class="w-full px-4 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" 
        />
      </div>

      <!-- Password -->
      <div class="relative">
        <label class="block text-gray-700 font-medium mb-1">Password</label>
        <input 
          type="password" 
          placeholder="Enter your password" 
          required 
          class="w-full px-4 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 pr-10" 
        />
        <button 
          type="button" 
          class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 focus:outline-none"
        >
          👁️
        </button>
      </div>

      <!-- Remember me & forgot password -->
      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2">
          <input type="checkbox" class="rounded border-gray-300" />
          Remember me
        </label>
        <a href="#" class="text-blue-600 hover:underline">Forgot password?</a>
      </div>

      <!-- Login Button -->
      <button 
        type="submit" 
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition-colors"
      >
        Log In
      </button>
    </form>

    <!-- Sign Up Link -->
    <p class="text-center text-gray-500 text-sm">
      Don't have an account? <a href="#" class="text-blue-600 hover:underline">Sign Up</a>
    </p>

  </div>

</body>
</html>
